baseURL: "https://eliza-notes.com/"
title: "Eliza's Notes"
paginate: 10
theme: hugo-PaperMod
languageCode: en-us

author:
  name: "Eliza Chen"
  email: "819407190@qq.com"

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - JSON
  page:
    - HTML
  section:
    - HTML
  taxonomy:
    - HTML
  term:
    - HTML

params:
  defaultTheme: auto
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowShareButtons: false
  
  homeInfoParams:
    Title: "Eliza 陈仪真"
    Content: |
      **MA in Sociology @ Minzu University of China** | Organizational & Digital Sociologist
      
      I'm a sociologist exploring how digital technologies reshape social organization and relationships. Currently pursuing my Master's degree, I conduct fieldwork examining emerging organizational forms—particularly how decentralized systems transform trust-building, skill-sharing, and community formation in rural contexts.
      
      My research interests lie at the intersection of **organizational sociology** and **technology sociology**, with a specific focus on understanding how technologies, organizations, and social relationships co-evolve and mutually shape each other.
  
  socialIcons:
    - name: github
      url: "https://github.com/eliza0908"
    - name: email
      url: "mailto:819407190@qq.com"

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys:
      - title
      - permalink
      - summary
      - content

