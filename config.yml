baseURL: "https://eliza-notes.com/"
title: "Eliza's Notes"
paginate: 10
theme: hugo-PaperMod
languageCode: en-us

author:
  name: "Eliza Chen"
  email: "819407190@qq.com"

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - JSON
  page:
    - HTML
  section:
    - HTML
  taxonomy:
    - HTML
  term:
    - HTML

params:
  defaultTheme: auto
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowShareButtons: false

  profileMode:
    enabled: true
    title: "Eliza Chen"
    subtitle: "MA Sociology @ Minzu University of China. Fieldwork, ethnic minorities & rural China. Also: books, films, photography & slow living."
    imageUrl: ""
    imageTitle: "Eliza Chen"
    buttons:
      - name: Research
        url: /tags/research/
      - name: Reading
        url: /tags/reading/
      - name: About
        url: /about/

  socialIcons:
    - name: github
      url: "https://github.com/eliza0908"
    - name: email
      url: "mailto:819407190@qq.com"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    threshold: 0.4
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - name: Research
      url: /tags/research/
      weight: 1
    - name: Reading
      url: /tags/reading/
      weight: 2
    - name: Films
      url: /tags/film/
      weight: 3
    - name: Life
      url: /tags/life/
      weight: 4
    - name: Archive
      url: /archives/
      weight: 5
    - name: About
      url: /about/
      weight: 6
    - name: Search
      url: /search/
      weight: 7
