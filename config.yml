baseURL: "https://eliza-notes.com/"
title: "Eliza's Notes"
paginate: 10
theme: hugo-PaperMod
languageCode: en-us

author:
  name: "Eliza Chen"
  email: "819407190@qq.com"

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - JSON
  page:
    - HTML
  section:
    - HTML
  taxonomy:
    - HTML
  term:
    - HTML

params:
  defaultTheme: auto
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowShareButtons: false
  
  mainSections:
    - blog
  
  socialIcons:
    - name: github
      url: "https://github.com/eliza0908"
    - name: email
      url: "mailto:819407190@qq.com"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys:
      - title
      - permalink
      - summary
      - content

menu:
  main:
    - name: Research
      url: /research/
      weight: 1
    - name: Reading
      url: /reading/
      weight: 2
    - name: Films
      url: /films/
      weight: 3
    - name: Life
      url: /life/
      weight: 4
    - name: Archive
      url: /archives/
      weight: 5
    - name: About
      url: /about/
      weight: 6
    - name: Search
      url: /search/
      weight: 7
